<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body {
            background-color: #faf8ff;
            color: #131b2e;
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- TopAppBar Component -->

<main class="flex-grow pt-32 pb-16 px-6 max-w-5xl mx-auto w-full">
<!-- Main Tool Canvas -->
<div class="flex flex-col gap-12">
<!-- Bento-style Upload & Status Grid -->
<section class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
<!-- Large Upload Zone -->
<div class="lg:col-span-7 group">
<div class="relative bg-surface-container-lowest border-2 border-dashed border-outline-variant hover:border-primary transition-all duration-300 rounded-[2rem] p-12 flex flex-col items-center justify-center text-center h-[420px] cursor-pointer">
<div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity rounded-[2rem]"></div>
<div class="w-20 h-20 bg-primary-fixed rounded-3xl flex items-center justify-center mb-6 text-primary group-hover:scale-110 transition-transform duration-500">
<span class="material-symbols-outlined text-4xl" data-icon="upload_file">upload_file</span>
</div>
<h2 class="font-headline font-bold text-2xl mb-2 text-on-surface">Letakkan PDF Anda di sini</h2>
<p class="text-on-surface-variant max-w-xs mb-8"></p>
<button class="bg-primary text-on-primary font-headline font-bold px-8 py-4 rounded-full shadow-lg hover:shadow-primary/20 transition-all active:scale-95">
                            Pilih File
                        </button>
</div>
</div>
<!-- Settings & Info Panel -->
<div class="lg:col-span-5 flex flex-col gap-6">
<!-- File Metadata Card (Visible after upload simulation) -->
<div class="bg-surface-container-low rounded-[1.5rem] p-6 flex items-start gap-4" style="display: none;">
<div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center text-primary-container shadow-sm">
<span class="material-symbols-outlined" data-icon="description">description</span>
</div>
<div class="flex-grow">
<h3 class="font-headline font-bold text-on-surface">Tidak ada file dipilih</h3>
<div class="flex items-center gap-3 mt-1">
<span class="text-xs font-medium uppercase tracking-wider text-outline">-</span>
<span class="w-1 h-1 bg-outline-variant rounded-full"></span>
<span class="text-xs font-medium uppercase tracking-wider text-outline">-</span>
</div>
</div>
<button class="text-outline hover:text-error transition-colors">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<!-- Compression Settings Card -->
<div class="bg-surface-container-highest rounded-[1.5rem] p-8">
<h3 class="font-headline font-bold text-on-surface mb-6">Tingkat Kompresi</h3>
<div class="space-y-4">
<!-- Strength Options -->
<div class="grid grid-cols-1 gap-3">
<label class="flex items-center p-4 bg-surface-container-lowest rounded-2xl cursor-pointer hover:bg-white border border-transparent hover:border-primary/20 transition-all group">
<input checked="" class="w-5 h-5 text-primary focus:ring-primary border-outline-variant" name="strength" type="radio" value="ebook"/>
<div class="ml-4">
<div class="font-bold text-on-surface">Sedang(Recommended)</div>
<div class="text-xs text-on-surface-variant">Kompress sedang, kualitas baik</div>
</div>
</label>
<label class="flex items-center p-4 bg-surface-container-lowest rounded-2xl cursor-pointer hover:bg-white border border-transparent hover:border-primary/20 transition-all group">
<input class="w-5 h-5 text-primary focus:ring-primary border-outline-variant" name="strength" type="radio" value="screen"/>
<div class="ml-4">
<div class="font-bold text-on-surface">Rendah</div>
<div class="text-xs text-on-surface-variant">Kompress maksimal, kualitas rendah</div>
</div>
</label>
<label class="flex items-center p-4 bg-surface-container-lowest rounded-2xl cursor-pointer hover:bg-white border border-transparent hover:border-primary/20 transition-all group">
<input class="w-5 h-5 text-primary focus:ring-primary border-outline-variant" name="strength" type="radio" value="prepress"/>
<div class="ml-4">
<div class="font-bold text-on-surface">Tinggi</div>
<div class="text-xs text-on-surface-variant">Kompress minimal, kualitas terbaik</div>
</div>
</label>
</div>
</div>
</div>
<!-- CTA Button -->
<button class="w-full h-16 bg-gradient-to-r from-primary to-primary-container text-white rounded-full font-headline font-bold text-lg shadow-xl shadow-primary/20 hover:shadow-primary/30 active:scale-[0.98] transition-all flex items-center justify-center gap-3">
<span class="material-symbols-outlined" data-icon="bolt" data-weight="fill">bolt</span>
                        Kompres & Unduh
                    </button>
</div>
</section>
<!-- Decorative Info Section -->

</div>
</main>
<!-- Footer Component -->

<script>
let selectedFile = null;

const fileCard = document.querySelector('.bg-surface-container-low');
const fileNameEl = document.querySelector('h3');
const fileSizeEl = document.querySelector('.text-xs.font-medium.uppercase.tracking-wider.text-outline');
const filePagesEl = document.querySelectorAll('.text-xs.font-medium.uppercase.tracking-wider.text-outline')[1];
const dropZone = document.querySelector('.border-2.border-dashed');
const selectBtn = document.querySelector('button.bg-primary.text-on-primary');
const compressBtn = document.querySelector('button.w-full.h-16');
const removeBtn = document.querySelector('button.text-outline');
const fileInput = document.createElement('input');
fileInput.type = 'file';
fileInput.accept = '.pdf';
fileInput.style.display = 'none';
document.body.appendChild(fileInput);

// Update file display
function updateFileDisplay(file) {
    selectedFile = file;
    const size = (file.size / 1024 / 1024).toFixed(1) + ' MB';
    fileNameEl.textContent = file.name;
    fileSizeEl.textContent = size;
    filePagesEl.textContent = 'Estimasi halaman'; // Placeholder, since we can't count pages client-side
    fileCard.style.display = 'flex';
    dropZone.style.display = 'none';
}

// Handle file selection
fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) updateFileDisplay(file);
});

// Drop zone events
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('border-primary');
});
dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('border-primary');
});
dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('border-primary');
    const file = e.dataTransfer.files[0];
    if (file && file.type === 'application/pdf') {
        updateFileDisplay(file);
    }
});

// Select button
selectBtn.addEventListener('click', () => fileInput.click());

// Remove file
removeBtn.addEventListener('click', () => {
    selectedFile = null;
    fileCard.style.display = 'none';
    dropZone.style.display = 'flex';
});

async function requestCompress(password) {
    const quality = document.querySelector('input[name="strength"]:checked').value;

    const formData = new FormData();
    formData.append('file', selectedFile);
    formData.append('quality', quality);
    if (password) {
        formData.append('password', password);
    }

    const response = await fetch('/api/pdf/compress', {
        method: 'POST',
        body: formData
    });

    return response;
}

// Compress button
compressBtn.addEventListener('click', async () => {
    if (!selectedFile) {
        alert('Silakan pilih file PDF.');
        return;
    }

    try {
        // Pertama coba tanpa password
        let response = await requestCompress(null);

        if (response.status === 401) {
            // Cek apakah backend meminta password
            let payload;
            try {
                payload = await response.json();
            } catch (_) {
                payload = null;
            }

            const code = payload && (payload.code || (payload.detail && payload.detail.code));
            if (code === 'password_required') {
                const pwd = window.prompt('File ini dilindungi kata sandi. Masukkan kata sandi untuk kompresi:');
                if (!pwd) {
                    return;
                }
                response = await requestCompress(pwd);
            }
        }

        if (response.ok) {
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = selectedFile.name.replace('.pdf', '_compressed.pdf');
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        } else {
            let errorMsg = 'Kesalahan tidak diketahui.';
            try {
                const error = await response.json();
                if (typeof error.detail === 'string') {
                    errorMsg = error.detail;
                } else if (error.detail && error.detail.message) {
                    errorMsg = error.detail.message;
                }
            } catch (_) {}
            alert('Kesalahan: ' + errorMsg);
        }
    } catch (error) {
        alert('Kesalahan jaringan: ' + error.message);
    }
});
</script>

</body></html>
