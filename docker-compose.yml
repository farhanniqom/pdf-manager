version: '3.8'

services:
  app:
    image: farhanniqom/pdf-manager:latest
    container_name: pdf-manager-app
    ports:
      - "9000:8000"
    volumes:
      - ./storage:/app/storage
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1

    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s